
<!DOCTYPE html>
<html>
<head>
  <title>Leaderboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>🏆 Leaderboard</h2>

  <table id="leaderboardTable">
    <thead>
      <tr>
        <th>Rank</th>
        <th>Name</th>
        <th>User ID</th>
        <th>Total Score</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
fetch("https://tech-roadshow-api.gk690842.workers.dev/leaderboard")
  .then(res => res.json())
  .then(data => {
    const table = document.querySelector("tbody");

    data.forEach((user, index) => {
      const row = `
        <tr>
          <td>${index + 1}</td>
          <td>${user.name}</td>
          <td>${user.user_id}</td>
          <td>${user.total_score}</td>
        </tr>
      `;
      table.innerHTML += row;
    });
  });
</script>

</body>
</html>
