
<!DOCTYPE html>
<html>
<head>
<title>Leaderboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body onload="checkUser()">

<!-- Topbar -->
<div class="topbar" id="topbar"></div>

<div class="page-layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <h3>InfoSec Booth</h3>

    <a href="register.html">1) Register Yourself</a>

    <a onclick="toggleGames()">2) Game Overview ▼</a>
    <div class="submenu" id="gameMenu">
      <a href="game.html">Game 1</a>
      <a href="game.html">Game 2</a>
      <a href="game.html">Game 3</a>
      <a href="game.html">Game 4</a>
    </div>

    <a href="leaderboard.html">3) Leader Board</a>
    <a href="#">4) Live Dashboard</a>
    <a href="#">5) Admin Portal</a>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="container">
      <h2>🏆 Leaderboard</h2>

      <table border="1" width="100%">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Name</th>
            <th>User ID</th>
            <th>Total Score</th>
            <th>Reward</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>

    </div>
  </div>

</div>

<script src="script.js"></script>

<script>
fetch("https://tech-roadshow-api.gk690842.workers.dev/leaderboard")
.then(res => res.json())
.then(data => {
  const table = document.getElementById("tableBody");

  data.forEach((user, i) => {
    table.innerHTML += `
      <tr>
        <td>${i + 1}</td>
        <td>${user.name}</td>
        <td>${user.user_id}</td>
        <td>${user.total_score || 0}</td>
        <td>${user.gift}</td>
      </tr>
    `;
  });
});
</script>

</body>
</html>
