
<!DOCTYPE html>
<html>

</head>

<body>
<div class="page-layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <h3>InfoSec Booth</h3>

    <a href="register.html">1) Register Yourself</a>

    <a class="disabled">2) Game Overview</a>
    <div class="submenu">
      <a class="disabled">Game 1</a>

    </div>

    <a class="disabled">3) Leader Board</a>

  </div>

  <!-- Content -->
  <div class="content">
    <div class="container">
      <h2>Register Yourself</h2>

      <input type="text" id="name" placeholder="Enter Name"><br><br>
      <input type="text" id="userid" placeholder="Enter User ID"><br><br>

      <p id="error" style="color:red;"></p>

      <button onclick="registerUser()">Register</button>
    </div>
  </div>

</div>

                      <script src="script.js"></script>

<script>
fetch("https://tech-roadshow-api.gk690842.workers.dev/leaderboard")
.then(res => res.json())
.then(data => {
  const table = document.getElementById("tableBody");

  data.forEach((user, i) => {
    table.innerHTML += `
      <tr>
        <td>${i + 1}</td>
        <td>${user.name}</td>
        <td>${user.user_id}</td>
        <td>${user.total_score || 0}</td>
        <td>${user.gift}</td>
      </tr>
    `;
  });
});
</script>
</body>
</html>
